<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Brands test</title>
  <style>
    body {
      margin: 0;
      background: #050510;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #fff;
    }

    .brands {
      padding: 40px 0;
      overflow: hidden;
    }

    .brands__track {
      display: flex;
      gap: 2rem;
      animation: brandsMove 20s linear infinite;
      width: max-content;
    }

    .brand {
      width: 16rem;
      height: 4.5rem;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: 600;
      white-space: nowrap;
      background: transparent;
      opacity: 0.9;
    }

    @keyframes brandsMove {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .technogym { color: #9975ff; }
    .life      { color: #02ffd1; }
    .hammer    { color: #e0e0e0; }
    .matrix    { color: mediumorchid; }
    .rogue     { color: rgb(148, 214, 117); }
  </style>
</head>
<body>

<section class="brands">
  <div class="brands__track">
    <div class="brand technogym">Technogym</div>
    <div class="brand life">Life Fitness</div>
    <div class="brand hammer">Hammer Strength</div>
    <div class="brand matrix">Matrix</div>
    <div class="brand rogue">Rogue Fitness</div>

    <div class="brand technogym">Technogym</div>
    <div class="brand life">Life Fitness</div>
    <div class="brand hammer">Hammer Strength</div>
    <div class="brand matrix">Matrix</div>
    <div class="brand rogue">Rogue Fitness</div>
  </div>
</section>

</body>
</html>
